name: Build & Release
on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/SSLUnpinner-${SHORT_SHA}.apk

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/debug/SSLUnpinner-${{ env.SHORT_SHA }}.apk"
          name: "Commit: ${{ env.SHORT_SHA }}"
          tag: "${{ env.SHORT_SHA }}"
          commit: ${{ github.sha }}
          body: "Automated build for commit ${{ env.SHORT_SHA }}"
          token: ${{ secrets.GITHUB_TOKEN }}
